<!DOCTYPE html>
<html>
<head>
    <title>BombSquda Leaderboard</title>
    <link rel="icon" type="image/x-icon" href="static/favicon_new.ico">
    <meta content="BombSquda Leaderboard" property="og:title"/>
	<meta name="twitter:card" content="summary_large_image">
    <style>
		.a2 {
			/* Set display to inline-block so transform works */
			display: inline-block; 
			
			/* Smooths the scaling effect */
			transition: transform 0.2s ease-in-out; 
			
			/* Optional: additional styling */
			padding: 10px 15px;
			color: #000;
			text-decoration: none;
		}
		/* unvisited link */
		.a2:link {
		  color: white;
		  background-color: transparent;
		  text-decoration: none;
		}

		/* visited link */
		.a2:visited {
		  color: white;
		  background-color: transparent;
		  text-decoration: none;
		}

		/* mouse over link */
		.a2:hover {
		  color: blue;
		  background-color: transparent;
		  text-decoration: none; /* optional: adds underline on hover */
		  transform: scale(1.1);
		}

		/* selected link */
		.a2:active {
		  color: cyan;
		  background-color: transparent;
		  text-decoration: none;
		  transform: scale(1.4);
		  transition: transform 0.1s ease-in-out; 
		}
		@font-face {
			font-family: 'bombsquad';
			src: url('static/hobo.ttf') format('truetype');
			font-weight: light;
			font-style: normal;
		}
        body {
            color: #ccc4ff;
            font-family: sans-serif;
			background-image: url('static/earth.png');
			background-size: cover;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #ada1ff;
        }

        .box {
            background: #232f73;
            padding: 20px;
            border-radius: 12px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #333;
        }

        .entry:last-child {
            border-bottom: none;
        }

        .time {
            color: #98d09f;
        }
    </style>
</head>
<body>
	<h2><a href="/" class="a2"><- Go Back</a></h2>
    <h1>Leaderboard</h1>
    <div class="box" id="board">
        Loading...
    </div>

	<script>
		fetch("/api/get_scores")
			.then(r => r.json())
			.then(data => {
				const board = document.getElementById("board");
				board.innerHTML = "";

				for (const campaign in data) {
					const campaignHeader = document.createElement("h1");
					campaignHeader.textContent = campaign;
					board.appendChild(campaignHeader);

					const levels = data[campaign];

					for (const level in levels) {
						const levelData = levels[level];

						const h2 = document.createElement("h2");
						h2.textContent = prettifyLevelName(level);
						board.appendChild(h2);

						for (const playerCount in levelData) {

							if (playerCount === "score_type")
								continue;

							const h3 = document.createElement("h3");
							h3.textContent = `${playerCount[0]} Player(s)`;
							board.appendChild(h3);

							const leaderboard = levelData[playerCount];

							for (const [score, player] of leaderboard) {
								const row = document.createElement("div");
								row.className = "entry";

								row.innerHTML = `
									<span>${player}</span>
									<span class="score">
										${formatScore(
											score,
											levelData.score_type
										)}
									</span>
								`;

								board.appendChild(row);
							}
						}
					}
				}
			});

		function formatScore(score, scoreType) {
			if (scoreType === "time") {
				const m = Math.floor(score / 60);
				const s = Math.floor(score % 60);
				const ms = Math.floor(
					(score - Math.floor(score)) * 1000
				);

				return `${m.toString().padStart(2, '0')}:${
					s.toString().padStart(2, '0')
				}:${ms.toString().padStart(3, '0')}`;
			}

			return score.toLocaleString();
		}

		function prettifyLevelName(raw) {
			return raw
				.replace(/^Default:/, "Hard: ")
				.replace(/^Easy:/, "Easy: ")
				.replace(/_squdaPB$/, "");
		}
	</script>
</body>
</html>
